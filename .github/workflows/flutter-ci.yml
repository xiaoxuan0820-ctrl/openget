name: Build OpenGet App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Android Debug APK
  android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project
        run: |
          flutter create --platforms=android --org=com.openget .

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build Android Debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/openget-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/openget-debug.apk
          retention-days: 7

  # iOS 构建 (macOS)
  ios-build:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate iOS project
        run: |
          flutter create --platforms=ios --org=com.openget .

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Get iOS simulators
        id: get-simulators
        run: |
          xcrun simctl list devices available | head -30

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-simulator
          path: build/ios/iphonesimulator/Runner.app
          retention-days: 7

  # Android Release APK (可直接安装)
  android-release-apk:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project
        run: |
          flutter create --platforms=android --org=com.openget .

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/openget-release.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/openget-release.apk
          retention-days: 30
